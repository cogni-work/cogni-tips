# Contract: parse-candidates-md.sh
# Parses tips-candidates.md and extracts selected candidates to JSON

contract_version: "1.0"
script_name: parse-candidates-md
script_path: scripts/parse-candidates-md.sh

description: |
  Parses tips-candidates.md and extracts selected candidates to JSON format.
  Used to convert user selections into structured data for processing.

parameters:
  required:
    - name: file
      type: string
      description: Path to tips-candidates.md file
      example: "/path/to/project/02-refined-questions/tips-candidates.md"
  optional:
    - name: json
      type: flag
      description: Output results as JSON
      default: false

exit_codes:
  0: Success - candidates parsed
  1: Error - file not found or parse failure

output:
  json_mode:
    success_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            metadata:
              type: object
              properties:
                industry_sector:
                  type: string
                parsed_at:
                  type: string
                  format: date-time
            candidates:
              type: array
              items:
                type: object
                properties:
                  dimension:
                    type: string
                  horizon:
                    type: string
                  sequence:
                    type: integer
                  trend_name:
                    type: string
                  keywords:
                    type: string
                  rationale:
                    type: string
                  source:
                    type: string
    error_schema:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string

examples:
  - description: Parse candidates with JSON output
    command: bash scripts/parse-candidates-md.sh --file tips-candidates.md --json
    expected_exit: 0
